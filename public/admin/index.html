      DECAP CMS ADMIN PAGE
      ====================
      This page loads the Decap CMS content editor. Staff visit
      /admin on the live site to use it.

      How it works in plain terms:
       1. Staff visits  https://pyt-website.pages.dev/admin
       2. They see a "Login with GitHub" button.
       3. After logging in, Decap reads the site's content files
          from the GitHub repo and shows them as friendly forms.
       4. Saving in Decap creates a Git commit. Cloudflare sees
          the commit and rebuilds the site within a couple of minutes.

      The version below is pinned to a known-good release.
    -->
