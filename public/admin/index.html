<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager · Peninsula Youth Theatre</title>
    <!--
      DECAP CMS ADMIN PAGE
      ====================
      This page loads the Decap CMS content editor. Staff visit
      /admin on the live site to use it.

      Important: the Decap script MUST be inside <body>, not <head>.
      If placed in <head> it runs before the body element exists,
      causing a "Cannot read properties of null (reading 'appendChild')"
      error. This file follows the official Decap CMS install example.
    -->
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>
  </body>
</html>
