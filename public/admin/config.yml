# ============================================================
# DECAP CMS CONFIGURATION
# ============================================================
# This file tells Decap CMS:
#   - Where the content lives (the GitHub repo + branch).
#   - How to log staff in (via our Cloudflare Functions OAuth endpoint).
#   - What content "collections" staff can edit (forms they see).
#
# Phase 2 adds: Shows, Programs, Donor Tiers, About, Casting,
# plus a Donate Settings record for the Soapbox embed URL.
# ============================================================
 
backend:
  name: github
  repo: PYTheatre/pyt-website
  branch: main
  base_url: https://pyt-website.pages.dev
  auth_endpoint: /api/auth
 
# Where uploaded images & files are stored in the repo.
media_folder: "public/uploads"
public_folder: "/uploads"
 
# Helpful, friendly commit messages so the GitHub history reads well.
commit_messages:
  create: "Create {{collection}} entry: {{slug}}"
  update: "Update {{collection}} entry: {{slug}}"
  delete: "Delete {{collection}} entry: {{slug}}"
  uploadMedia: "Upload media: {{path}}"
  deleteMedia: "Delete media: {{path}}"
 
# ------------------------------------------------------------
# COLLECTIONS — the editing forms staff see
# ------------------------------------------------------------
collections:
 
  # ============================================================
  # SHOWS — one entry per Mainstage production.
  # Folder collection: each show becomes its own file under
  # src/content/shows/, and the site generates a detail page
  # at /shows/<slug> automatically.
  # ============================================================
  - name: "shows"
    label: "Shows"
    label_singular: "Show"
    description: "Mainstage productions. Each show gets its own page at /shows/<slug>."
    folder: "src/content/shows"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{start_date}}"
    sortable_fields: ["start_date", "title"]
    fields:
      - { name: "title", label: "Show title", widget: "string", hint: "Example: Dragons Love Tacos" }
      - { name: "eyebrow", label: "Eyebrow text", widget: "string", required: false, hint: "Small text above the title on the show page. Example: Spring 2026 Mainstage" }
      - { name: "start_date", label: "First performance date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "end_date", label: "Last performance date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "date_display", label: "Date display text", widget: "string", hint: "How dates appear on the page. Example: May 15–16, 2026" }
      - { name: "venue", label: "Venue", widget: "string", default: "Mountain View Center for the Performing Arts" }
      - { name: "runtime_minutes", label: "Runtime (minutes)", widget: "number", value_type: "int", required: false, min: 1, max: 600, step: 1, pattern: ["^[0-9]*$", "Enter a whole number of minutes only (for example 90), or leave it blank."], hint: "Approximate, in minutes. Whole numbers only — for example 90. Leave blank if unknown." }
      - { name: "ages", label: "Recommended ages", widget: "string", required: false, hint: "Example: Ages 5 and up" }
      - { name: "poster", label: "Show poster image", widget: "image", required: false, hint: "Tall portrait images work best — aim for a 3:4 shape (e.g. 1200 × 1600 pixels). Keep the title and key artwork centred, with comfortable empty margin around the edges: the image is cropped differently on different screens, and that margin is what stops anything important getting cut off. Avoid putting text near the very edges. If empty, a colored placeholder is used." }
      - { name: "synopsis", label: "Synopsis", widget: "text", hint: "1–3 short paragraphs about the show." }
      - { name: "ticketing_url", label: "Buy Tickets link (external URL)", widget: "string", required: false, hint: "Where to buy tickets. Leave blank if tickets aren't on sale yet." }
      - { name: "audition_url", label: "Audition sign-up link (external URL)", widget: "string", required: false, hint: "Where people sign up to audition. Leave blank to hide the Auditions button entirely." }
      - { name: "audition_start", label: "Audition start date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, required: false, hint: "First day of auditions. For a single-day audition, set this and the end date to the same day. Leave blank if not scheduled yet." }
      - { name: "audition_end", label: "Audition end date (for auto-closing)", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, required: false, hint: "Last day of auditions. After this day passes, the Auditions button automatically greys out to 'Auditions closed'. For a single-day audition, use the same day as the start." }
      - { name: "audition_display", label: "Audition dates (shown to families)", widget: "string", required: false, hint: "The audition dates as you want visitors to read them. Example: August 3–7, 2026. Shown next to the Auditions button. Leave blank to show no date text." }
      - { name: "cast_page_url", label: "Cast page link (internal URL)", widget: "string", required: false, hint: "Optional. Example: /cast/dragons-love-tacos" }
      # --- DOUBLE-CAST PERFORMANCE SCHEDULE ---
      # Tick "This show is double cast" to turn on the performance schedule,
      # then fill in the list below. The schedule only shows on the website
      # when the box is ticked AND at least one performance is listed — so an
      # un-ticked show (or a ticked one with an empty list) shows nothing.
      # The two cast-name fields are just reminders for you while you fill in
      # the list. The performances list is what families see: one row per
      # performance, telling them which cast plays when, with a buy link
      # straight to that performance.
      - { name: "double_cast", label: "This show is double cast", widget: "boolean", required: false, default: false, hint: "Tick this if the show has two casts performing on different dates. It turns on the 'Performances & casts' schedule below. Leave unticked for single-cast shows." }
      - { name: "cast_a_name", label: "Cast name 1 (for your reference)", widget: "string", required: false, hint: "Example: Ruby Cast. Just a reminder for you while filling in the list below — type the cast name into each performance row." }
      - { name: "cast_b_name", label: "Cast name 2 (for your reference)", widget: "string", required: false, hint: "Example: Emerald Cast." }
      - name: "performances"
        label: "Performance schedule (which cast plays when)"
        widget: "list"
        required: false
        summary: "{{fields.date_label}} {{fields.time_label}} — {{fields.cast}}"
        hint: "Add one row per performance. Families use this to see which cast performs on each date and to buy tickets for that exact performance. Leave empty if this show isn't double cast — the whole section then stays hidden on the page."
        fields:
          - { name: "date_label", label: "Date", widget: "string", hint: "As you want families to read it. Example: Thu, Jun 25" }
          - { name: "time_label", label: "Time", widget: "string", required: false, hint: "Example: 7:30pm. Leave blank if not needed." }
          - { name: "cast", label: "Which cast", widget: "string", hint: "The cast performing this date. Example: Ruby Cast" }
          - { name: "buy_url", label: "Buy tickets link for this performance", widget: "string", required: false, hint: "The link to buy tickets for THIS specific performance. Leave blank to show 'On sale soon' instead of a button." }
 
  # ============================================================
  # PROGRAMS — Classes, Camps, Stories on Stage, Studio Intensives.
  # One form covers all four, with a "Program type" dropdown.
  # ============================================================
  - name: "programs"
    label: "Classes & Camps"
    label_singular: "Program"
    description: "Classes, camps, and Studio Intensives. Each program is a card on the Programs page that links out to Active.com for registration. (Stories on Stage productions have their own section.)"
    folder: "src/content/programs"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{program_type}}"
    sortable_fields: ["name", "program_type", "season"]
    fields:
      - { name: "name", label: "Program name", widget: "string", hint: "Example: Drama Tots" }
      - { name: "eyebrow", label: "Eyebrow text (audience)", widget: "string", required: false, hint: "Example: For Young Performers" }
      - name: "program_type"
        label: "Program type"
        widget: "select"
        options: ["Class", "Camp", "Studio Intensive"]
        default: "Class"
      - { name: "age_range", label: "Age range", widget: "string", hint: "Example: Ages 4–6" }
      - name: "season"
        label: "Season"
        widget: "select"
        options: ["Fall", "Spring", "Summer", "Year-round"]
        default: "Year-round"
      - { name: "description", label: "Description", widget: "text" }
      - { name: "schedule", label: "Schedule blurb", widget: "string", required: false, hint: "Example: Wednesdays 4–5pm, 8 weeks" }
      - { name: "tuition", label: "Tuition / cost", widget: "string", required: false, hint: "Example: $240 per session" }
      - { name: "registration_url", label: "Active.com registration link", widget: "string", required: false, hint: "Where families register. Leave blank if registration isn't open yet." }
      - { name: "scholarships_available", label: "Scholarships available?", widget: "boolean", default: false }
 
  # ============================================================
  # STORIES ON STAGE PRODUCTIONS — one entry per production.
  # The annual SoS company performs 6 productions per year. Each
  # production shows up as a card on the /stories-on-stage page,
  # with its own Buy Tickets and School Bookings links.
  # Unlike Mainstage shows, SoS productions do NOT have their own
  # detail pages — they live entirely on the Stories on Stage page.
  # ============================================================
  - name: "stories-on-stage"
    label: "Stories on Stage Productions"
    label_singular: "Production"
    description: "The 6 productions performed by the Stories on Stage company each year."
    folder: "src/content/stories-on-stage"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{start_date}}"
    sortable_fields: ["start_date", "title"]
    fields:
      - { name: "title", label: "Production title", widget: "string", hint: "Example: The Very Hungry Caterpillar" }
      - { name: "start_date", label: "First performance date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "end_date", label: "Last performance date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: "date_display", label: "Date display text", widget: "string", hint: "How dates appear on the card. Example: October 10–25, 2026" }
      - { name: "venue", label: "Venue", widget: "string", default: "PYT Studio Theatre + touring" }
      - { name: "synopsis", label: "Short synopsis", widget: "text", hint: "2–3 sentences. Stories on Stage cards are smaller than Mainstage show cards." }
      - { name: "poster", label: "Poster image", widget: "image", required: false, hint: "Upload an optional poster. If empty, a colored placeholder is used." }
      - { name: "public_ticketing_url", label: "Buy Tickets link (public performances)", widget: "string", required: false, hint: "Leave blank to hide the Buy Tickets button." }
      - { name: "school_bookings_url", label: "School Bookings link", widget: "string", required: false, hint: "Leave blank to hide the School Bookings button." }
 
  # ============================================================
  # CAST PAGES — one entry per show's cast page.
  # These live at /cast/<slug> and are NOT in the site nav. Share the
  # URL directly with the cast (e.g. by newsletter).
  #
  # IMPORTANT — the password is a SOFT gate, not real security. The
  # page content is still sent to the browser and can be viewed by
  # someone who knows how to look. Only put NON-SENSITIVE info here
  # (first names, roles, general rehearsal times, notes). Never put
  # addresses, medical info, or other sensitive data on a cast page.
  # ============================================================
  - name: "cast-pages"
    label: "Cast Pages"
    label_singular: "Cast Page"
    description: "Password-protected cast pages, one per show. Not in the site menu — share the link with your cast. The password is a light gate for non-sensitive info only (see the note on each field)."
    folder: "src/content/cast-pages"
    create: true
    identifier_field: "show_title"
    slug: "{{slug}}"
    summary: "{{show_title}}"
    fields:
      - { name: "show_title", label: "Show title", widget: "string", hint: "Example: Matilda — Spring 2026" }
      - { name: "password", label: "Page password", widget: "string", hint: "The password you'll share with the cast. Keep it simple to share, but not obvious. NOTE: this is a light gate, not strong security — never put sensitive personal info on this page." }
      - { name: "intro", label: "Intro text (optional)", widget: "text", required: false, hint: "Shown at the top, above the sheets. Use blank lines between paragraphs." }
      - { name: "cast_list_sheet_url", label: "Cast list — LINK to a private Google Sheet (optional)", widget: "string", required: false, hint: "Paste the link to your cast list sheet. This is shown as a 'View the cast list' button — it is NOT embedded. IMPORTANT: keep this sheet PRIVATE in Google (share it only with specific cast-family accounts or a cast Google Group — NOT 'anyone with the link'), because it contains children's full names. Leave blank to hide the button." }
      - { name: "rehearsal_sheet_url", label: "Rehearsal schedule — EMBEDDED Google Sheet (optional)", widget: "string", required: false, hint: "Paste the share link for the rehearsal schedule. This IS embedded on the page, so it must use ROLE NAMES ONLY (e.g. 'Jack, Crutchie, Newsies') and must NOT contain any child's name (including in the notes column). This is the sheet you'll update through the run. Leave blank to hide it." }
      - name: "resources"
        label: "Rehearsal resources (optional)"
        label_singular: "Resource link"
        widget: "list"
        required: false
        summary: "{{fields.label}}"
        hint: "Links to rehearsal materials — Google Drive folders for choreography videos, costume lists, music tracks, etc. Each one shows as a button on the page. NOTE: anyone with the page password can see these links, so share each Drive folder deliberately in Google — use 'anyone with the link can view' only for non-sensitive material, and restrict to cast accounts for anything identifying. Leave empty to hide this section."
        fields:
          - { name: "label", label: "Button label", widget: "string", hint: "What the button says. Example: Choreography videos" }
          - { name: "url", label: "Link (Google Drive folder or file)", widget: "string", hint: "Paste the Google Drive share link." }
      - { name: "body", label: "Notes (optional)", widget: "text", required: false, hint: "Any extra notes for the cast — contacts, what to bring, parking, reminders. Shown below the sheets." }
 
  # ============================================================
  # SITE SETTINGS — single-record collections for site-wide values.
  # The "Donation Campaign" record already exists from Phase 1.
  # Phase 2 adds "Donor Tiers", "Donate Page", "About Page", "Casting Page".
  # ============================================================
  - name: "settings"
    label: "Site Settings"
    label_singular: "Site Settings"
    description: "Edit site-wide values: donation campaign, donor tiers, Support PYT page, about page, and casting page."
    delete: false
    editor:
      preview: false
    files:
 
      # --- Home Page ---
      # All editable copy on the home page. Layout/structure stays in
      # code. The "Now Playing" poster is automatic (next upcoming show
      # from the Shows collection), so there's no field for it here.
      - name: "home-page"
        label: "Home Page"
        file: "src/content/settings/home-page.json"
        description: "All the words, links, and numbers on the home page. The 'Now Playing' poster updates automatically from your Shows list."
        fields:
          - { name: "hero_eyebrow", label: "Hero — small eyebrow text", widget: "string", hint: "Example: On stage now · Spring 2026" }
          - { name: "hero_heading", label: "Hero — main headline", widget: "string", hint: "Example: Outstanding youth theatre." }
          - { name: "hero_heading_italic_word", label: "Hero — word to italicize", widget: "string", required: false, hint: "One word in the headline to show in italic accent style. Must exactly match a word in the headline, or leave blank for none." }
          - { name: "hero_lede", label: "Hero — intro paragraph", widget: "text" }
          - { name: "hero_image", label: "Hero — banner photo (wide, under the intro)", widget: "image", required: false, hint: "Optional. A wide landscape photo shown as a banner under the intro text. Leave empty to hide it." }
          - { name: "hero_primary_label", label: "Hero — primary button label", widget: "string" }
          - { name: "hero_primary_url", label: "Hero — primary button link", widget: "string" }
          - { name: "hero_secondary_label", label: "Hero — secondary button label", widget: "string" }
          - { name: "hero_secondary_url", label: "Hero — secondary button link", widget: "string" }
          - { name: "now_playing_label", label: "Poster — 'Now playing' label", widget: "string", default: "Now playing" }
          - { name: "discovery_eyebrow", label: "Discovery section — eyebrow", widget: "string", default: "Find your way in" }
          - { name: "discovery_heading", label: "Discovery section — heading", widget: "string" }
          - name: "discovery_cards"
            label: "Discovery cards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { name: "eyebrow", label: "Card eyebrow", widget: "string", hint: "Example: For families" }
              - { name: "title", label: "Card title", widget: "string" }
              - { name: "body", label: "Card text", widget: "text" }
              - { name: "url", label: "Card link", widget: "string", hint: "Example: /shows" }
          - { name: "impact_eyebrow", label: "Impact section — eyebrow", widget: "string", default: "Our impact" }
          - { name: "impact_heading", label: "Impact section — heading", widget: "string" }
          - name: "stats"
            label: "Impact stats"
            widget: "list"
            summary: "{{fields.figure}} — {{fields.label}}"
            fields:
              - { name: "figure", label: "Big number", widget: "string", hint: "Example: 30+ or $45K" }
              - { name: "label", label: "Description", widget: "string" }
          - { name: "donate_heading", label: "Donation teaser — heading", widget: "string", required: false, hint: "The big line above the progress bar. If left blank, it shows 'Help us reach $[your goal].' automatically. Type your own wording to override it (e.g. 'Be part of our 2026 campaign')." }
          - { name: "donate_lede", label: "Donation teaser — paragraph", widget: "text" }
          - { name: "donate_button_label", label: "Donation teaser — button label", widget: "string", default: "Make a Gift" }
 
      # --- Shows Page (hero text only; the shows themselves are their own collection) ---
      - name: "shows-page"
        label: "Shows Page (intro)"
        file: "src/content/settings/shows-page.json"
        description: "The heading and intro text at the top of the Shows page. (The shows themselves are edited under 'Shows'.)"
        fields:
          - { name: "eyebrow", label: "Eyebrow text", widget: "string" }
          - { name: "title", label: "Page title", widget: "string" }
          - { name: "lede", label: "Intro paragraph", widget: "text" }
 
      # --- Programs Page (hero text only) ---
      - name: "programs-page"
        label: "Classes & Camps Page (intro)"
        file: "src/content/settings/programs-page.json"
        description: "The heading and intro text at the top of the Classes & Camps page. (The programs themselves are edited under 'Classes & Camps'.)"
        fields:
          - { name: "eyebrow", label: "Eyebrow text", widget: "string" }
          - { name: "title", label: "Page title", widget: "string" }
          - { name: "lede", label: "Intro paragraph", widget: "text" }
 
      # --- Footer (tagline + copyright line) ---
      - name: "footer"
        label: "Footer"
        file: "src/content/settings/footer.json"
        description: "The tagline and copyright text in the site footer. (The footer link columns are part of the site structure.)"
        fields:
          - { name: "tagline", label: "Tagline", widget: "text", hint: "Short line under the PYT name in the footer." }
          - { name: "copyright_extra", label: "Copyright extra text", widget: "string", hint: "Shown after the year. Example: 501(c)(3) · EIN 77-0335126" }
 
      # --- Donation campaign progress numbers (from Phase 1) ---
      - name: "donation-campaign"
        label: "Donation Campaign"
        file: "src/content/settings/donation-campaign.json"
        fields:
          - { name: "goal_amount", label: "Goal amount (whole dollars, no commas)", widget: "number", value_type: "int", min: 0, default: 200000 }
          - { name: "raised_amount", label: "Amount raised so far (whole dollars, no commas)", widget: "number", value_type: "int", min: 0, default: 76420 }
          - { name: "donor_count", label: "Number of donors", widget: "number", value_type: "int", min: 0, default: 142 }
          - { name: "campaign_label", label: "Campaign name shown on the home page", widget: "string", default: "2026 Annual Campaign" }
 
      # --- Donor tiers shown on the Donate page ---
      - name: "donor-tiers"
        label: "Donor Tiers"
        file: "src/content/settings/donor-tiers.json"
        description: "The list of giving tiers shown on the Donate page (Friend, Supporter, etc.)."
        fields:
          - name: "tiers"
            label: "Tiers"
            widget: "list"
            summary: "{{fields.name}} — {{fields.range}}"
            fields:
              - { name: "name", label: "Tier name", widget: "string" }
              - { name: "range", label: "Amount range", widget: "string", hint: "Example: $50–$249" }
              - { name: "description", label: "Description", widget: "text" }
 
      # --- Donate page settings (Soapbox embed URL, intro copy) ---
      - name: "donate-page"
        label: "Support PYT"
        file: "src/content/settings/donate-page.json"
        description: "The Support PYT page — intro text, employer matching note, the Soapbox donation link, and the sponsorship section wording."
        fields:
          - { name: "intro_heading", label: "Intro heading", widget: "string", default: "Every gift makes the next show possible." }
          - { name: "intro_body", label: "Intro paragraph", widget: "text" }
          - { name: "soapbox_donate_url", label: "Soapbox donation page link", widget: "string", required: false, hint: "The web address of PYT's hosted Soapbox donation page that the Donate AND sponsorship buttons open. Defaults to https://pyt.secure.nonprofitsoapbox.com/donate if left blank." }
          - { name: "tiers_eyebrow", label: "Giving levels — small label above heading", widget: "string", required: false, hint: "Leave blank to hide this small label entirely." }
          - { name: "tiers_heading", label: "Giving levels — section heading", widget: "string", required: false, default: "Every gift, every level." }
          - { name: "sponsor_eyebrow", label: "Sponsorship — small label above heading", widget: "string", required: false, hint: "Leave blank to hide this small label entirely." }
          - { name: "sponsor_heading", label: "Sponsorship — section heading", widget: "string", required: false, default: "Sponsor a show or a season." }
          - { name: "sponsor_show_title", label: "Sponsorship — \"Show\" card title", widget: "string", required: false, default: "Sponsor a Show" }
          - { name: "sponsor_show_price", label: "Sponsorship — \"Show\" price (optional)", widget: "string", required: false, hint: "Optional. e.g. \"$5,000\". Leave blank to show no price on the Show card." }
          - { name: "sponsor_show_description", label: "Sponsorship — \"Show\" card description", widget: "text", required: false }
          - { name: "sponsor_season_title", label: "Sponsorship — \"Season\" card title", widget: "string", required: false, default: "Sponsor a Season" }
          - { name: "sponsor_season_price", label: "Sponsorship — \"Season\" price (optional)", widget: "string", required: false, hint: "Optional. e.g. \"$15,000\". Leave blank to show no price on the Season card." }
          - { name: "sponsor_season_description", label: "Sponsorship — \"Season\" card description", widget: "text", required: false }
 
      # --- Corporate Giving panel (Support PYT page) ---
      - name: "corporate-giving"
        label: "Corporate Giving"
        file: "src/content/settings/corporate-giving.json"
        description: "The Corporate Giving panel on the Support PYT page — intro copy, the corporate Soapbox donation link, and the corporate tiers (Partner, Patron, etc.)."
        fields:
          - { name: "eyebrow", label: "Small label above heading", widget: "string", required: false, hint: "Leave blank to hide this small label entirely." }
          - { name: "heading", label: "Section heading", widget: "string", default: "Corporate Giving" }
          - { name: "intro", label: "Intro paragraph", widget: "text", required: false }
          - { name: "contact_email", label: "Contact email (optional)", widget: "string", required: false, hint: "Optional. Shown under the intro as a clickable email link, e.g. lhatten@pytnet.org. Leave blank to hide." }
          - { name: "corporate_donate_url", label: "Corporate Soapbox donation link", widget: "string", required: false, hint: "The web address of PYT's corporate Soapbox donation page. While this is blank, the tier buttons show \"Coming soon\". Paste the link here once the page exists to make the buttons live." }
          - name: "tiers"
            label: "Corporate tiers"
            widget: "list"
            summary: "{{fields.name}} — {{fields.amount}}"
            fields:
              - { name: "name", label: "Tier name", widget: "string", hint: "Example: Partner" }
              - { name: "amount", label: "Amount", widget: "string", hint: "Example: $2,500" }
              - { name: "description", label: "Benefits / description", widget: "text" }
 
      # --- Donor & sponsor recognition (Support PYT page) ---
      - name: "donor-recognition"
        label: "Donor Recognition"
        file: "src/content/settings/donor-recognition.json"
        description: "The recognition wall at the bottom of the Support PYT page. Each group is a heading with a list of names. A group with no names is hidden automatically. Use the \"Supporters\" group for donors who want to be recognized but not have their giving level shown."
        fields:
          - { name: "eyebrow", label: "Small label above heading", widget: "string", required: false, default: "With gratitude" }
          - { name: "heading", label: "Section heading", widget: "string", default: "Our Donors & Sponsors" }
          - { name: "intro", label: "Intro paragraph", widget: "text", required: false }
          - name: "groups"
            label: "Recognition groups"
            widget: "list"
            summary: "{{fields.tier_name}}"
            fields:
              - { name: "tier_name", label: "Group / tier heading", widget: "string", hint: "Example: Producer, or Supporters (for level-not-shown)" }
